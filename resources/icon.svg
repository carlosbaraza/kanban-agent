<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </linearGradient>
    <linearGradient id="glow" x1="256" y1="300" x2="256" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Subtle inner shadow -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Column 1 - 3 cards -->
  <rect x="72" y="80" width="104" height="56" rx="12" fill="url(#card)"/>
  <rect x="72" y="148" width="104" height="72" rx="12" fill="url(#card)"/>
  <rect x="72" y="232" width="104" height="48" rx="12" fill="url(#card)"/>

  <!-- Column 2 - 2 cards -->
  <rect x="196" y="80" width="120" height="64" rx="12" fill="url(#card)"/>
  <rect x="196" y="156" width="120" height="88" rx="12" fill="url(#card)"/>

  <!-- Column 3 - 2 cards (one highlighted) -->
  <rect x="336" y="80" width="104" height="80" rx="12" fill="url(#card)"/>
  <rect x="336" y="172" width="104" height="56" rx="12" fill="rgba(255,255,255,0.35)"/>

  <!-- Agent cursor / terminal prompt -->
  <g transform="translate(140, 340)">
    <!-- Terminal window -->
    <rect x="0" y="0" width="232" height="120" rx="16" fill="rgba(0,0,0,0.35)"/>
    <rect x="0" y="0" width="232" height="120" rx="16" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

    <!-- Terminal dots -->
    <circle cx="20" cy="16" r="5" fill="#FF5F57"/>
    <circle cx="36" cy="16" r="5" fill="#FEBC2E"/>
    <circle cx="52" cy="16" r="5" fill="#28C840"/>

    <!-- Terminal text lines -->
    <rect x="16" y="36" width="60" height="6" rx="3" fill="#A78BFA"/>
    <rect x="82" y="36" width="90" height="6" rx="3" fill="rgba(255,255,255,0.5)"/>

    <rect x="16" y="52" width="40" height="6" rx="3" fill="#34D399"/>
    <rect x="62" y="52" width="120" height="6" rx="3" fill="rgba(255,255,255,0.4)"/>

    <rect x="16" y="68" width="50" height="6" rx="3" fill="#A78BFA"/>
    <rect x="72" y="68" width="80" height="6" rx="3" fill="rgba(255,255,255,0.5)"/>

    <!-- Blinking cursor -->
    <rect x="16" y="84" width="8" height="14" rx="2" fill="#A78BFA">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
